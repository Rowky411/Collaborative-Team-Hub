<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Collab Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(128,128,160,0.2); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(128,128,160,0.35); }

  /* transitions */
  .screen-enter { animation: screenIn 0.22s cubic-bezier(0.4,0,0.2,1) both; }
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.18s ease both; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  input, button, kbd { font-family: inherit; }
  button:focus-visible { outline: 2px solid #7c5cfc; outline-offset: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<!-- load all components via Babel (JSX) in dependency order -->
<script type="text/babel" src="flux-tokens.jsx"></script>
<script type="text/babel" src="flux-nav.jsx"></script>
<script type="text/babel" src="flux-screens.jsx"></script>

<!-- tweaks panel -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "wsAccent": "purple"
}/*EDITMODE-END*/;

const WS_COLORS = {
  purple: '#7c5cfc',
  teal:   '#06b6d4',
  green:  '#22c55e',
  amber:  '#f59e0b',
};

const WORKSPACE_TABS = [
  { id: 'overview',      icon: '⊞', label: 'Overview' },
  { id: 'dashboard',     icon: '◉', label: 'Dashboard' },
  { id: 'goals',         icon: '◎', label: 'Goals' },
  { id: 'announcements', icon: '◈', label: 'Announcements' },
  { id: 'actions',       icon: '◻', label: 'Action Items' },
  { id: 'settings',      icon: '⊛', label: 'Settings' },
  { id: 'audit',         icon: '◑', label: 'Audit Log' },
];

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = tweaks.theme;
  const t = useTheme(theme);

  // routing state
  const [screen, setScreen] = React.useState('picker');          // picker | workspace
  const [activeTab, setActiveTab] = React.useState('overview');  // workspace sub-tab
  const [selectedWs, setSelectedWs] = React.useState(null);
  const [selectedGoal, setSelectedGoal] = React.useState(null);
  const [animKey, setAnimKey] = React.useState(0);

  // accent override from tweaks
  const wsAccentColor = WS_COLORS[tweaks.wsAccent] || PURPLE;

  function navigate(newScreen, tab) {
    setScreen(newScreen);
    if (tab) setActiveTab(tab);
    setAnimKey(k => k + 1);
  }

  function handleSelectWs(ws) {
    const enriched = { ...ws, color: wsAccentColor };
    setSelectedWs(enriched);
    setActiveTab('overview');
    navigate('workspace');
  }

  function handleTabChange(tabId) {
    setActiveTab(tabId);
    setAnimKey(k => k + 1);
    // reset goal detail when leaving goals
    if (tabId !== 'goals') setSelectedGoal(null);
  }

  // derived workspace object (with tweaked accent)
  const ws = selectedWs ? { ...selectedWs, color: wsAccentColor } : null;

  // which screen content to show inside workspace
  function renderTabContent() {
    if (!ws) return null;
    const key = `${activeTab}-${animKey}`;
    if (activeTab === 'overview')      return <div key={key} className="screen-enter" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}><ScreenDashboard t={t} ws={ws} setScreen={(s) => { if (s === 'goals') handleTabChange('goals'); if (s === 'actions') handleTabChange('actions'); }} /></div>;
    if (activeTab === 'dashboard')     return <div key={key} className="screen-enter" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}><ScreenAnalyticsDashboard t={t} ws={ws} setScreen={handleTabChange} /></div>;
    if (activeTab === 'goals' && selectedGoal) return <div key={key} className="screen-enter" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}><ScreenGoalDetail t={t} ws={ws} goal={selectedGoal} setScreen={(s) => { if (s === 'goals') { setSelectedGoal(null); setAnimKey(k=>k+1); } }} /></div>;
    if (activeTab === 'goals')         return <div key={key} className="screen-enter" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}><ScreenGoals t={t} ws={ws} setScreen={() => {}} setSelectedGoal={(g) => { setSelectedGoal(g); setAnimKey(k=>k+1); }} /></div>;
    if (activeTab === 'announcements') return <div key={key} className="screen-enter" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}><ScreenAnnouncementsV2 t={t} ws={ws} /></div>;
    if (activeTab === 'actions')       return <div key={key} className="screen-enter" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}><ScreenActions t={t} ws={ws} /></div>;
    if (activeTab === 'settings')      return <div key={key} className="screen-enter" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}><ScreenSettings t={t} ws={ws} /></div>;
    if (activeTab === 'audit')         return <div key={key} className="screen-enter" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}><ScreenAuditLog t={t} ws={ws} /></div>;
    return null;
  }

  return (
    <div style={{ width: '100%', height: '100%', background: t.bg, display: 'flex', flexDirection: 'column', color: t.text }}>

      {/* ── TOP NAV ── */}
      <TopNav
        t={t}
        screen={screen}
        setScreen={navigate}
        theme={theme}
        setTheme={(v) => setTweak('theme', v)}
        wsName={ws?.name}
        wsColor={ws?.color}
        onlineCount={2}
        members={MEMBERS}
      />

      {/* ── WORKSPACE COVER + TABS (only in workspace view) ── */}
      {screen === 'workspace' && ws && (
        <WorkspaceCover
          t={t}
          wsName={ws.name}
          wsColor={ws.color}
          wsDesc={ws.desc}
          wsRole={ws.role}
          tabs={WORKSPACE_TABS}
          activeTab={activeTab}
          setActiveTab={handleTabChange}
          members={MEMBERS}
        />
      )}

      {/* ── MAIN CONTENT ── */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minHeight: 0 }}>
        {screen === 'picker' && (
          <div key="picker" className="screen-enter" style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            <ScreenPicker t={t} onSelect={handleSelectWs} />
          </div>
        )}
        {screen === 'workspace' && ws && (
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            {renderTabContent()}
          </div>
        )}
      </div>

      {/* ── TWEAKS PANEL ── */}
      <TweaksPanel>
        <TweakSection label="Appearance" />
        <TweakRadio
          label="Theme"
          value={tweaks.theme}
          options={['dark', 'light']}
          onChange={(v) => setTweak('theme', v)}
        />
        <TweakSection label="Workspace accent" />
        <TweakRadio
          label="Color"
          value={tweaks.wsAccent}
          options={['purple', 'teal', 'green', 'amber']}
          onChange={(v) => setTweak('wsAccent', v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
