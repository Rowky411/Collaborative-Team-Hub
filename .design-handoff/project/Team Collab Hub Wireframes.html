  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">

// ─── SHARED UTILS ──────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "direction": "all"
}/*EDITMODE-END*/;

// ─── SHARED TOKENS ─────────────────────────────────────────────────────────────
const tok = {
  purple: '#7c5cfc',
  purpleLight: '#a78bfa',
  purpleDim: 'rgba(124,92,252,0.15)',

  // dark theme
  dkBg: '#0d0d14',
  dkSurface: '#13131e',
  dkCard: '#1a1a2a',
  dkBorder: 'rgba(255,255,255,0.07)',
  dkText: '#e8e8f0',
  dkMuted: '#6b6b85',
  dkSubtle: '#3a3a50',

  // light theme
  ltBg: '#f5f5f7',
  ltSurface: '#ffffff',
  ltCard: '#ffffff',
  ltBorder: 'rgba(0,0,0,0.07)',
  ltText: '#111118',
  ltMuted: '#8888a0',
  ltSubtle: '#dddde8',
};

function useTheme(theme) {
  const isDark = theme === 'dark';
  return {
    isDark,
    bg: isDark ? tok.dkBg : tok.ltBg,
    surface: isDark ? tok.dkSurface : tok.ltSurface,
    card: isDark ? tok.dkCard : tok.ltCard,
    border: isDark ? tok.dkBorder : tok.ltBorder,
    text: isDark ? tok.dkText : tok.ltText,
    muted: isDark ? tok.dkMuted : tok.ltMuted,
    subtle: isDark ? tok.dkSubtle : tok.ltSubtle,
  };
}

// ─── SHARED MICRO COMPONENTS ───────────────────────────────────────────────────
function Avatar({ name, size = 28, color = tok.purple }) {
  const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: color, display: 'flex', alignItems: 'center',
      justifyContent: 'center', fontSize: size * 0.38, fontWeight: 600,
      color: '#fff', flexShrink: 0, fontFamily: 'DM Sans',
    }}>{initials}</div>
  );
}

function Badge({ label, color = tok.purple, bg }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      padding: '2px 8px', borderRadius: 999,
      background: bg || `${color}22`, color: color,
      fontSize: 11, fontWeight: 600, fontFamily: 'DM Mono, monospace',
      letterSpacing: '0.02em', whiteSpace: 'nowrap',
    }}>{label}</span>
  );
}

function ProgressRing({ pct = 0, size = 48, stroke = 4, color = tok.purple, trackColor = 'rgba(255,255,255,0.08)' }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)', flexShrink: 0 }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={trackColor} strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={`${dash} ${circ - dash}`} strokeLinecap="round" />
    </svg>
  );
}

function ProgressBar({ pct = 0, height = 4, color = tok.purple, trackColor = 'rgba(255,255,255,0.08)' }) {
  return (
    <div style={{ background: trackColor, borderRadius: 999, height, overflow: 'hidden', width: '100%' }}>
      <div style={{ width: `${pct}%`, height: '100%', background: color, borderRadius: 999, transition: 'width 0.4s ease' }} />
    </div>
  );
}

function OnlineDot({ color = '#22c55e', size = 8 }) {
  return <div style={{ width: size, height: size, borderRadius: '50%', background: color, flexShrink: 0 }} />;
}

function HatchFill({ width, height, label, style = {} }) {
  return (
    <div style={{
      width, height, borderRadius: 8, position: 'relative', overflow: 'hidden',
      background: 'repeating-linear-gradient(45deg, rgba(120,120,160,0.06) 0px, rgba(120,120,160,0.06) 1px, transparent 1px, transparent 8px)',
      border: '1.5px dashed rgba(120,120,180,0.18)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      ...style,
    }}>
      {label && <span style={{ fontFamily: 'DM Mono, monospace', fontSize: 10, color: 'rgba(160,160,200,0.5)', textAlign: 'center', padding: 8 }}>{label}</span>}
    </div>
  );
}

// ─── DIRECTION A: "ORBITAL" ────────────────────────────────────────────────────
// Slim icon rail, floating panels, Notion-calm, dark grid texture

        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 14, color: '#fff', fontWeight: 700, marginBottom: 20,

      {icons.map((ic, i) => (

          width: 36, height: 36, borderRadius: 8, cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',

}

            color: t.muted, fontSize: 13,

            <span style={{ fontSize: 20, fontWeight: 300 }}>+</span>
            <span>Create workspace</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = tweaks.theme;
  const dk = useTheme('dark');
  const lt = useTheme('light');
  const t = theme === 'dark' ? dk : lt;

  const artboardStyle = { width: 860, height: 520, borderRadius: 12, overflow: 'hidden', background: t.bg };

  return (
    <>
      <DesignCanvas>
        {/* ─── DIRECTION A: ORBITAL ─────────────────────────── */}
        <DCSection id="dir-a" title="Direction A — Orbital  ·  slim icon rail, floating panels, Notion-calm">
          <DCArtboard id="a-picker" label="01 Workspace Picker" width={860} height={520}>
            <div style={artboardStyle}><OrbitalWorkspacePicker t={t} /></div>
          </DCArtboard>
          <DCArtboard id="a-dash" label="02 Workspace Dashboard" width={860} height={520}>
            <div style={artboardStyle}><OrbitalDashboard t={t} /></div>
          </DCArtboard>
          <DCArtboard id="a-goals" label="03 Goals & Milestones" width={860} height={520}>
            <div style={artboardStyle}><OrbitalGoals t={t} /></div>
          </DCArtboard>
        </DCSection>

        {/* ─── DIRECTION B: STRATA ──────────────────────────── */}
        <DCSection id="dir-b" title="Direction B — Strata  ·  workspace color bleeds, table layout, wide sidebar">
          <DCArtboard id="b-picker" label="01 Workspace Picker" width={860} height={520}>
            <div style={artboardStyle}><StrataWorkspacePicker t={t} /></div>
          </DCArtboard>
          <DCArtboard id="b-dash" label="02 Workspace Dashboard" width={860} height={520}>
            <div style={artboardStyle}><StrataDashboard t={t} /></div>
          </DCArtboard>
          <DCArtboard id="b-goals" label="03 Goals & Milestones" width={860} height={520}>
            <div style={artboardStyle}><StrataGoals t={t} /></div>
          </DCArtboard>
        </DCSection>

        {/* ─── DIRECTION C: FLUX ────────────────────────────── */}
        <DCSection id="dir-c" title="Direction C — Flux  ·  hero cover, command palette, ring stats">
          <DCArtboard id="c-picker" label="01 Workspace Picker" width={860} height={520}>
            <div style={artboardStyle}><FluxWorkspacePicker t={t} /></div>

            <div style={artboardStyle}><FluxGoals t={t} /></div>

      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={tweaks.theme} options={['dark','light']} onChange={(v) => setTweak('theme', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
